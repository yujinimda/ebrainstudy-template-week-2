<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시글 목록</title>
</head>
<body>
    <h1>게시글 목록</h1>

    <form th:action="@{/boards}" method="get">
        <input type="text" name="keyword" th:value="${keyword}" placeholder="제목 검색">
        <button type="submit">검색</button>
    </form>

    <table border="1" cellpadding="6">
        <thead>
            <tr>
                <th>번호</th>
                <th>제목</th>
                <th>작성자</th>
                <th>조회수</th>
                <th>작성일</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="board : ${boards}">
                <td th:text="${board.boardId}">1</td>
                <td th:text="${board.title}">제목 미리보기</td>
                <td th:text="${board.writer}">작성자</td>
                <td th:text="${board.viewCount}">0</td>
                <td th:text="${board.createdAt}">2026-01-01</td>
            </tr>
            <tr th:if="${#lists.isEmpty(boards)}">
                <td colspan="5">게시글이 없습니다.</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
