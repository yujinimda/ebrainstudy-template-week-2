spring.application.name=board

# ── 이슈 #3: DB(MySQL) 접속 정보 ─────────────────────────────────
# 값 출처: docker/docker-compose.yml (포트 3309, DB ebrainsoft_study, 계정 ebsoft/ebsoft)
# ${환경변수:기본값} — 환경변수가 있으면 그 값, 없으면 기본값(로컬 docker용)을 쓴다.
#   → 실서버에선 DB_USERNAME/DB_PASSWORD 환경변수만 주입하면 코드 변경 없이 안전.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3309/ebrainsoft_study}
spring.datasource.username=${DB_USERNAME:ebsoft}
spring.datasource.password=${DB_PASSWORD:ebsoft}
# ─────────────────────────────────────────────────────────────

# ── 이슈 #5: MyBatis 설정 ────────────────────────────────────────
# Mapper XML 파일들의 위치 (resources/mapper/*.xml)
mybatis.mapper-locations=classpath:mapper/*.xml
# DB의 snake_case 컬럼(board_id)을 자바 camelCase 필드(boardId)에 자동 매핑.
#   ↳ 이게 없으면 board_id → boardId 연결이 안 돼 boardId가 null로 들어옴.
mybatis.configuration.map-underscore-to-camel-case=true
# ─────────────────────────────────────────────────────────────
