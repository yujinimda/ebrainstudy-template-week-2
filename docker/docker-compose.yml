version: "3.8"
services:
  mysql:
    image: mysql:8.0
    container_name: study-db-week2
    ports:
      # 1주차(3308)와 동시에 띄워도 충돌하지 않게 3309 사용
      - 3309:3306
    environment:
      MYSQL_ROOT_PASSWORD: admin!32
      TZ: Asia/Seoul
      MYSQL_DATABASE: ebrainsoft_study
      MYSQL_USER: ebsoft
      MYSQL_PASSWORD: ebsoft
    command:
      - --character-set-server=UTF8MB4
      - --collation-server=UTF8MB4_UNICODE_CI
    volumes:
      # 최초 기동 시 이 폴더의 .sql 파일이 자동 실행됨 (테이블/기본데이터 생성)
      - ./initdb:/docker-entrypoint-initdb.d
